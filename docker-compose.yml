services:
  caddy:
    build:
      context: .
      dockerfile: docker/caddy.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "2019:2019"
    networks:
      - brimble-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - LOG_BROKER=channel
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=brimble
      - DB_PASSWORD=brimble
      - DB_NAME=brimble
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - S3_BUCKET=brimble-deployments
      - DATABASE_URL=postgres://brimble:brimble@postgres:5432/brimble?sslmode=disable
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOMAIN=localhost
      - CADDY_ADMIN_URL=http://caddy:2019
      - BUILD_MODE=prod
      - BUILDKIT_HOST=docker-container://buildkit
      - DOCKER_NETWORK=brimble-paas_brimble-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - brimble-network
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: brimble
      POSTGRES_PASSWORD: brimble
      POSTGRES_DB: brimble
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - brimble-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brimble -d brimble"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    restart: unless-stopped
    environment:
      - SERVICES=s3
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - brimble-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  buildkit:
    image: moby/buildkit
    restart: unless-stopped
    privileged: true
    networks:
      - brimble-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles:
      - redis
    networks:
      - brimble-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js"]
    profiles:
      - nats
    networks:
      - brimble-network

networks:
  brimble-network:
    driver: bridge

volumes:
  pgdata:
  localstack_data:
